<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Counter</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 100px;
      }
      #count {
        font-size: 64px;
        margin: 20px;
      }
      button {
        font-size: 20px;
        padding: 10px 20px;
        margin: 0 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Counter</h1>
    <div id="count">0</div>
    <div>
      <button id="decrement">-</button>
      <button id="reset">Reset</button>
      <button id="increment">+</button>
    </div>

    <script src="counter.js"></script>
  </body>
  </html>
